<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プラグイン情報提供フォーム</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        /* 全体のリセットと基本設定は index.html と共有すると良いけど、ここでは独立して定義するね */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            margin: 0;
            background-color: #000;
            color: #fff;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.3s, color 0.3s;
        }


        .container {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            margin-top: 20px;
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            font-weight: 700;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .notice {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 25px;
            padding: 15px;
            background-color: #111;
            border: 1px dashed #444;
            border-radius: 4px;
            text-align: center;
        }
        .notice strong {
            color: #fff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #eee;
            font-size: 1.1em;
        }

        input[type="text"],
        input[type="url"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #555;
            border-radius: 4px;
            background-color: #222;
            color: #eee;
            font-size: 1em;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus,
        input[type="url"]:focus,
        textarea:focus {
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button[type="submit"] {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #fff;
            color: #000;
            border: 1px solid #fff;
            border-radius: 4px;
            font-size: 1.2em;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
            margin-top: 30px;
        }

        button[type="submit"]:hover {
            background-color: #000;
            color: #fff;
            border-color: #fff;
        }

        .back-button {
            display: inline-flex; /* アイコンとテキストを並べる */
            align-items: center; /* 垂直方向中央揃え */
            gap: 8px; /* アイコンとテキストの間隔 */
            margin-top: 25px;
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 1em;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .back-button:hover {
            background-color: #555;
            border-color: #777;
        }
        .back-button i {
            font-size: 1.2em;
        }

        /* レスポンシブ対応 */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 2em;
                margin-bottom: 25px;
            }
            .notice {
                padding: 10px;
                margin-bottom: 20px;
            }
            .form-group label {
                font-size: 1em;
            }
            input[type="text"],
            input[type="url"],
            textarea {
                padding: 10px;
                font-size: 0.9em;
            }
            button[type="submit"] {
                padding: 12px;
                font-size: 1.1em;
            }
            .back-button {
                padding: 8px 15px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>新しいプラグインの情報募集中</h1>
        <div class="notice">
            <strong>ご注意:</strong> 送信していただいた情報がサイトに反映されるまでお時間を頂く場合がございます。<br>
            なるべく更新頻度を上げますが、多少の遅れや情報の更新が間に合わないことがあることをご了承ください。
        </div>
        <form id="pluginSuggestionForm">
            <div class="form-group">
                <label for="pluginName">プラグイン名 (必須)</label>
                <input type="text" id="pluginName" required placeholder="例: Extended Filter Plus">
            </div>
            <div class="form-group">
                <label for="pluginUrl">ダウンロードURL または 情報掲載ページURL (必須)</label>
                <input type="url" id="pluginUrl" required placeholder="例: https://example.com/plugin-download">
            </div>
            <div class="form-group">
                <label for="description">簡単な説明</label>
                <textarea id="description" rows="5" placeholder="プラグインの機能や特徴を簡単に教えてください。"></textarea>
            </div>
            <div class="form-group">
                <label for="tags">タグの候補 (カンマ区切り)</label>
                <input type="text" id="tags" placeholder="例: フィルタ, スクリプト, 拡張, エフェクト">
            </div>
            <button type="submit">情報を送信する</button>
        </form>
    </div>

    <a href="index.html" class="back-button">
        <i class="ri-arrow-left-line"></i>
        ページトップへ戻る
    </a>

    <script>
        const pluginSuggestionForm = document.getElementById('pluginSuggestionForm');

        pluginSuggestionForm.addEventListener('submit', function(event) {
            event.preventDefault(); // フォームのデフォルト送信をキャンセル

            const pluginName = document.getElementById('pluginName').value;
            const pluginUrl = document.getElementById('pluginUrl').value;
            const description = document.getElementById('description').value;
            const tags = document.getElementById('tags').value;

            // メール本文を作成
            let mailBody = `
新しいプラグインの情報提供です。

---
プラグイン名: ${pluginName}
URL: ${pluginUrl}
説明:
${description || 'なし'}
タグの候補: ${tags || 'なし'}
---
`;
            // mailtoリンクを作成
            // エンコードしないと長いURLや特殊文字で問題が起きる可能性があるため、encodeURIComponentを使う
            const subject = encodeURIComponent('新しいAviUtl2プラグイン情報提供');
            const body = encodeURIComponent(mailBody);
            // ここに、情報を受け取るメールアドレスを設定してね！
            const recipientEmail = 'maincraft0418yuta@gmail.com'; // ★★★ ここを先生のメールアドレスに置き換えてね！ ★★★

            window.location.href = `mailto:${recipientEmail}?subject=${subject}&body=${body}`;

            alert('ご提供ありがとうございます！メールクライアントが起動しますので、内容をご確認の上送信してください。');
            pluginSuggestionForm.reset(); // フォームをリセット
        });
    </script>
</body>
</html>
