<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ただいまメンテナンス中です</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #000; /* 背景を黒に */
            color: #fff; /* 文字色を白に */
            text-align: center;
        }

        h1 {
            font-size: 2.8em;
            margin-bottom: 20px;
            /* 文字のアニメーションは無しにしました */
        }

        p {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .recovery-time {
            font-size: 1.3em;
            /* 強調のために少しだけ色を付けてもいいけど、今回は白に統一 */
            color: #fff;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>ただいまメンテナンス中です</h1>
    <p>
        いつもご利用いただきありがとうございます。<br>
        より良いサービスを提供するため、現在システムメンテナンスを行っております。
    </p>
    <p class="recovery-time">
        復旧は**10:00頃**を予定しております。
    </p>
    <p>
        ご不便をおかけいたしますが、何卒ご理解とご協力をお願いいたします。
    </p>
</body>
</html>
